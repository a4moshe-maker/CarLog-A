<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CarLog Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f1f5f9; color: #1e293b; min-height: 100vh; }
    .login-container { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #1e3a8a; }
    .login-card { background: white; border-radius: 16px; padding: 40px 32px; width: 380px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
    .login-card h1 { text-align: center; color: #1e40af; margin-bottom: 8px; font-size: 28px; }
    .login-card p { text-align: center; color: #6b7280; margin-bottom: 24px; font-size: 14px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-weight: 600; color: #374151; margin-bottom: 6px; font-size: 14px; }
    .form-group input { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 10px; font-size: 15px; direction: ltr; text-align: right; }
    .form-group input:focus { outline: none; border-color: #1e40af; box-shadow: 0 0 0 3px rgba(30,64,175,0.1); }
    .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; }
    .btn-primary { background: #1e40af; color: white; }
    .btn-primary:hover { background: #1e3a8a; }
    .btn-primary:disabled { background: #93c5fd; cursor: not-allowed; }
    .error-msg { color: #dc2626; text-align: center; margin-top: 12px; font-size: 14px; }
    .app { display: none; min-height: 100vh; }
    .app.active { display: flex; }
    .sidebar { width: 220px; background: #1e3a8a; color: white; padding: 24px 0; position: fixed; top: 0; right: 0; height: 100vh; }
    .sidebar h2 { text-align: center; padding: 0 16px 24px; border-bottom: 1px solid rgba(255,255,255,0.15); font-size: 22px; }
    .sidebar nav { padding: 16px 0; }
    .sidebar nav a { display: block; padding: 12px 24px; color: rgba(255,255,255,0.7); text-decoration: none; font-size: 15px; cursor: pointer; }
    .sidebar nav a:hover, .sidebar nav a.active { color: white; background: rgba(255,255,255,0.1); }
    .sidebar .sign-out { position: absolute; bottom: 24px; right: 0; left: 0; padding: 0 16px; }
    .sidebar .sign-out button { width: 100%; padding: 10px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: white; cursor: pointer; font-size: 14px; }
    .main { margin-right: 220px; flex: 1; padding: 32px; }
    .card { background: white; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); padding: 24px; margin-bottom: 24px; }
    .card h3 { font-size: 18px; margin-bottom: 16px; color: #111827; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: right; padding: 12px 16px; background: #f8fafc; color: #6b7280; font-size: 13px; font-weight: 600; border-bottom: 1px solid #e5e7eb; }
    td { padding: 12px 16px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
    tr:hover td { background: #f8fafc; }
    .clickable { cursor: pointer; }
    .btn-sm { padding: 6px 14px; border-radius: 8px; border: none; font-size: 13px; cursor: pointer; font-weight: 600; }
    .btn-danger { background: #fee2e2; color: #dc2626; }
    .btn-danger:hover { background: #fecaca; }
    .btn-edit { background: #dbeafe; color: #1e40af; }
    .btn-edit:hover { background: #bfdbfe; }
    .btn-back { background: #f3f4f6; color: #374151; padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; margin-bottom: 16px; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); text-align: center; }
    .stat-card .num { font-size: 28px; font-weight: 700; color: #1e40af; }
    .stat-card .label { font-size: 13px; color: #6b7280; margin-top: 4px; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .info-item { padding: 12px; background: #f8fafc; border-radius: 8px; }
    .info-item .label { font-size: 12px; color: #6b7280; margin-bottom: 4px; }
    .info-item .value { font-size: 15px; color: #111827; font-weight: 500; }
    .edit-form input, .edit-form textarea { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; margin-bottom: 12px; font-family: inherit; }
    .edit-form textarea { min-height: 80px; resize: vertical; }
    .edit-form label { display: block; font-size: 13px; color: #6b7280; margin-bottom: 4px; font-weight: 600; }
    .loading { text-align: center; padding: 40px; color: #6b7280; }
    .badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; background: #dbeafe; color: #1e40af; }
    .hidden { display: none; }
  </style>
</head>
<body>

<div id="login-screen" class="login-container">
  <div class="login-card">
    <h1>CarLog Admin</h1>
    <p id="login-subtitle">פאנל ניהול</p>
    <div id="login-step1">
      <div class="form-group">
        <label>אימייל</label>
        <input type="email" id="login-email" placeholder="admin@example.com">
      </div>
      <div class="form-group">
        <label>סיסמה</label>
        <input type="password" id="login-password" placeholder="סיסמה">
      </div>
      <button class="btn btn-primary" id="login-btn">כניסה</button>
    </div>
    <div id="login-step2" class="hidden">
      <div class="form-group">
        <label>קוד אימות (נשלח למייל)</label>
        <input type="text" id="login-otp" placeholder="הזן קוד" style="text-align:center;font-size:24px;letter-spacing:8px;">
      </div>
      <button class="btn btn-primary" id="otp-btn">אימות</button>
    </div>
    <div id="login-error" class="error-msg hidden"></div>
  </div>
</div>

<div id="app" class="app">
  <aside class="sidebar">
    <h2>CarLog Admin</h2>
    <nav>
      <a id="nav-users" class="active" data-page="users">👥 משתמשים</a>
    </nav>
    <div class="sign-out">
      <button id="signout-btn">יציאה</button>
    </div>
  </aside>
  <main class="main" id="main-content"></main>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const db = createClient(
  'https://ulcebkhczxmeqzdhmsqg.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVsY2Via2hjenhtZXF6ZGhtc3FnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNjY3MjMsImV4cCI6MjA4ODY0MjcyM30.JJUNzO3l1BIEm4guBB2TI0WF1gv0bIMaOfo0L4z0u-w'
);

let otpEmail = '';

function showError(msg) {
  const el = document.getElementById('login-error');
  if (msg) { el.textContent = msg; el.classList.remove('hidden'); }
  else { el.classList.add('hidden'); }
}

function formatDate(d) {
  if (!d) return '—';
  try { return new Date(d).toLocaleDateString('he-IL'); } catch { return d; }
}

// ===== AUTH =====

document.getElementById('login-btn').addEventListener('click', async () => {
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  showError('');
  if (!email || !password) { showError('הזן אימייל וסיסמה'); return; }

  document.getElementById('login-btn').disabled = true;
  const { data, error } = await db.auth.signInWithPassword({ email, password });
  if (error) { showError(error.message); document.getElementById('login-btn').disabled = false; return; }

  const { data: admin } = await db.from('admins').select('user_id').eq('user_id', data.user.id).single();
  if (!admin) { await db.auth.signOut(); showError('אין לך הרשאת מנהל'); document.getElementById('login-btn').disabled = false; return; }

  otpEmail = email;
  await db.auth.signOut();
  const { error: otpErr } = await db.auth.signInWithOtp({ email });
  if (otpErr) { showError(otpErr.message); document.getElementById('login-btn').disabled = false; return; }

  document.getElementById('login-step1').classList.add('hidden');
  document.getElementById('login-step2').classList.remove('hidden');
  document.getElementById('login-subtitle').textContent = 'קוד אימות נשלח ל-' + email;
  document.getElementById('login-btn').disabled = false;
});

document.getElementById('otp-btn').addEventListener('click', async () => {
  const token = document.getElementById('login-otp').value.trim();
  showError('');
  if (!token) { showError('הזן קוד אימות'); return; }

  document.getElementById('otp-btn').disabled = true;
  const { error } = await db.auth.verifyOtp({ email: otpEmail, token, type: 'email' });
  if (error) { showError('קוד שגוי או שפג תוקפו'); document.getElementById('otp-btn').disabled = false; return; }
  showApp();
});

document.getElementById('signout-btn').addEventListener('click', async () => {
  await db.auth.signOut();
  document.getElementById('app').classList.remove('active');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-step1').classList.remove('hidden');
  document.getElementById('login-step2').classList.add('hidden');
  document.getElementById('login-email').value = '';
  document.getElementById('login-password').value = '';
  document.getElementById('login-otp').value = '';
  showError('');
});

document.getElementById('nav-users').addEventListener('click', () => loadUsers());

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('active');
  loadUsers();
}

// ===== USERS =====

async function loadUsers() {
  const main = document.getElementById('main-content');
  main.innerHTML = '<div class="loading">טוען...</div>';

  const { data: users, error } = await db.rpc('admin_list_users');
  if (error) { main.innerHTML = '<div class="card"><p>שגיאה: ' + error.message + '</p></div>'; return; }

  const { data: vehicles } = await db.from('vehicles').select('user_id');
  const vc = {};
  (vehicles || []).forEach(v => { vc[v.user_id] = (vc[v.user_id] || 0) + 1; });

  let rows = users.map(u => {
    const tr = document.createElement('tr');
    tr.className = 'clickable';
    tr.innerHTML = '<td>' + (u.email || '—') + '</td><td><span class="badge">' + (vc[u.id] || 0) + '</span></td><td>' + formatDate(u.created_at) + '</td><td>' + formatDate(u.last_sign_in_at) + '</td><td><button class="btn-sm btn-danger del-user-btn">מחק</button></td>';
    tr.addEventListener('click', (e) => { if (!e.target.classList.contains('del-user-btn')) loadUserDetail(u.id); });
    tr.querySelector('.del-user-btn').addEventListener('click', () => deleteUser(u.id, u.email));
    return tr;
  });

  main.innerHTML = '<div class="stats"><div class="stat-card"><div class="num">' + users.length + '</div><div class="label">משתמשים</div></div><div class="stat-card"><div class="num">' + (vehicles || []).length + '</div><div class="label">רכבים</div></div></div><div class="card"><h3>משתמשים</h3><table><thead><tr><th>אימייל</th><th>רכבים</th><th>הצטרפות</th><th>כניסה אחרונה</th><th></th></tr></thead><tbody id="users-tbody"></tbody></table></div>';
  const tbody = document.getElementById('users-tbody');
  rows.forEach(r => tbody.appendChild(r));
}

async function deleteUser(userId, email) {
  if (!confirm('למחוק את המשתמש ' + email + '?')) return;
  if (!confirm('פעולה זו תמחק את כל נתוני המשתמש. להמשיך?')) return;
  const { error } = await db.rpc('admin_delete_user', { target_user_id: userId });
  if (error) { alert('שגיאה: ' + error.message); return; }
  loadUsers();
}

// ===== USER DETAIL =====

async function loadUserDetail(userId) {
  const main = document.getElementById('main-content');
  main.innerHTML = '<div class="loading">טוען...</div>';

  const { data: users } = await db.rpc('admin_list_users');
  const user = (users || []).find(u => u.id === userId);
  if (!user) { main.innerHTML = '<div class="card"><p>משתמש לא נמצא</p></div>'; return; }

  const { data: vehicles } = await db.from('vehicles').select('*').eq('user_id', userId);
  const vIds = (vehicles || []).map(v => v.id);
  let sc = {};
  if (vIds.length > 0) {
    const { data: svcs } = await db.from('service_records').select('vehicle_id').in('vehicle_id', vIds);
    (svcs || []).forEach(s => { sc[s.vehicle_id] = (sc[s.vehicle_id] || 0) + 1; });
  }

  main.innerHTML = '<div class="card"><h3>פרטי משתמש</h3><div class="info-grid"><div class="info-item"><div class="label">אימייל</div><div class="value">' + (user.email || '—') + '</div></div><div class="info-item"><div class="label">ID</div><div class="value" style="font-size:11px;font-family:monospace;word-break:break-all;">' + user.id + '</div></div><div class="info-item"><div class="label">הצטרפות</div><div class="value">' + formatDate(user.created_at) + '</div></div><div class="info-item"><div class="label">כניסה אחרונה</div><div class="value">' + formatDate(user.last_sign_in_at) + '</div></div></div></div><div class="card"><h3>רכבים (' + (vehicles || []).length + ')</h3><table><thead><tr><th>רכב</th><th>לוחית</th><th>שנה</th><th>טיפולים</th><th></th></tr></thead><tbody id="vehicles-tbody"></tbody></table></div>';

  // Back button
  const backBtn = document.createElement('button');
  backBtn.className = 'btn-back';
  backBtn.textContent = '← חזרה למשתמשים';
  backBtn.addEventListener('click', () => loadUsers());
  main.insertBefore(backBtn, main.firstChild);

  // Delete user button
  const delBtn = document.createElement('button');
  delBtn.className = 'btn-sm btn-danger';
  delBtn.textContent = 'מחק משתמש';
  delBtn.style.marginTop = '16px';
  delBtn.addEventListener('click', () => deleteUser(userId, user.email));
  main.appendChild(delBtn);

  const tbody = document.getElementById('vehicles-tbody');
  (vehicles || []).forEach(v => {
    const tr = document.createElement('tr');
    tr.className = 'clickable';
    tr.innerHTML = '<td>' + v.make + ' ' + v.model + '</td><td>' + v.license_plate + '</td><td>' + v.year + '</td><td><span class="badge">' + (sc[v.id] || 0) + '</span></td><td><button class="btn-sm btn-danger del-v-btn">מחק</button></td>';
    tr.addEventListener('click', (e) => { if (!e.target.classList.contains('del-v-btn')) loadVehicleDetail(v.id, userId); });
    tr.querySelector('.del-v-btn').addEventListener('click', () => deleteVehicle(v.id, userId));
    tbody.appendChild(tr);
  });
}

// ===== VEHICLE DETAIL =====

async function loadVehicleDetail(vehicleId, userId) {
  const main = document.getElementById('main-content');
  main.innerHTML = '<div class="loading">טוען...</div>';

  const { data: vehicle } = await db.from('vehicles').select('*').eq('id', vehicleId).single();
  if (!vehicle) { main.innerHTML = '<div class="card"><p>רכב לא נמצא</p></div>'; return; }

  const { data: services } = await db.from('service_records').select('*').eq('vehicle_id', vehicleId).order('date', { ascending: false });
  const totalCost = (services || []).reduce((sum, s) => sum + (s.cost || 0), 0);

  main.innerHTML = '';

  const backBtn = document.createElement('button');
  backBtn.className = 'btn-back';
  backBtn.textContent = '← חזרה למשתמש';
  backBtn.addEventListener('click', () => loadUserDetail(userId));
  main.appendChild(backBtn);

  // Stats
  const statsDiv = document.createElement('div');
  statsDiv.className = 'stats';
  statsDiv.innerHTML = '<div class="stat-card"><div class="num">' + (services || []).length + '</div><div class="label">טיפולים</div></div><div class="stat-card"><div class="num">₪' + totalCost.toLocaleString() + '</div><div class="label">סה"כ עלות</div></div>';
  main.appendChild(statsDiv);

  // Vehicle info
  const vCard = document.createElement('div');
  vCard.className = 'card';
  vCard.innerHTML = '<h3>' + vehicle.make + ' ' + vehicle.model + ' ' + vehicle.year + ' — ' + vehicle.license_plate + '</h3><div class="info-grid"><div class="info-item"><div class="label">יצרן</div><div class="value">' + vehicle.make + '</div></div><div class="info-item"><div class="label">דגם</div><div class="value">' + vehicle.model + '</div></div><div class="info-item"><div class="label">שנה</div><div class="value">' + vehicle.year + '</div></div><div class="info-item"><div class="label">לוחית</div><div class="value">' + vehicle.license_plate + '</div></div><div class="info-item"><div class="label">דלק</div><div class="value">' + (vehicle.sug_delek || '—') + '</div></div><div class="info-item"><div class="label">גיר</div><div class="value">' + (vehicle.gir || '—') + '</div></div><div class="info-item"><div class="label">ק"מ</div><div class="value">' + (vehicle.current_mileage ? vehicle.current_mileage.toLocaleString() : '—') + '</div></div><div class="info-item"><div class="label">טסט</div><div class="value">' + (vehicle.tokef_dt || '—') + '</div></div></div>';

  const editBtn = document.createElement('button');
  editBtn.className = 'btn-sm btn-edit';
  editBtn.textContent = 'עריכה';
  editBtn.style.marginTop = '16px';
  editBtn.addEventListener('click', () => showVehicleEdit(vehicleId, userId, vehicle));

  const delVBtn = document.createElement('button');
  delVBtn.className = 'btn-sm btn-danger';
  delVBtn.textContent = 'מחק רכב';
  delVBtn.style.marginTop = '16px';
  delVBtn.style.marginRight = '8px';
  delVBtn.addEventListener('click', () => deleteVehicle(vehicleId, userId));

  const btnsDiv = document.createElement('div');
  btnsDiv.appendChild(editBtn);
  btnsDiv.appendChild(delVBtn);
  vCard.appendChild(btnsDiv);
  main.appendChild(vCard);

  // Services
  const sCard = document.createElement('div');
  sCard.className = 'card';
  sCard.innerHTML = '<h3>היסטוריית טיפולים</h3>';

  if ((services || []).length === 0) {
    sCard.innerHTML += '<p style="color:#6b7280">אין טיפולים</p>';
  } else {
    const tbl = document.createElement('table');
    tbl.innerHTML = '<thead><tr><th>תאריך</th><th>עבודה</th><th>עלות</th><th>ק"מ</th><th></th></tr></thead>';
    const tb = document.createElement('tbody');
    (services || []).forEach(s => {
      const tr = document.createElement('tr');
      tr.innerHTML = '<td>' + formatDate(s.date) + '</td><td>' + s.work_done + '</td><td>₪' + (s.cost || 0) + '</td><td>' + (s.mileage ? s.mileage.toLocaleString() : '—') + '</td><td></td>';
      const td = tr.querySelector('td:last-child');

      const eBtn = document.createElement('button');
      eBtn.className = 'btn-sm btn-edit';
      eBtn.textContent = 'ערוך';
      eBtn.addEventListener('click', () => showServiceEdit(s, vehicleId, userId));

      const dBtn = document.createElement('button');
      dBtn.className = 'btn-sm btn-danger';
      dBtn.textContent = 'מחק';
      dBtn.style.marginRight = '4px';
      dBtn.addEventListener('click', () => deleteService(s.id, vehicleId, userId));

      td.appendChild(eBtn);
      td.appendChild(dBtn);
      tb.appendChild(tr);
    });
    tbl.appendChild(tb);
    sCard.appendChild(tbl);
  }
  main.appendChild(sCard);
}

function showVehicleEdit(vehicleId, userId, v) {
  const main = document.getElementById('main-content');
  main.innerHTML = '';

  const backBtn = document.createElement('button');
  backBtn.className = 'btn-back';
  backBtn.textContent = '← חזרה לרכב';
  backBtn.addEventListener('click', () => loadVehicleDetail(vehicleId, userId));
  main.appendChild(backBtn);

  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = '<h3>עריכת רכב</h3><div class="edit-form"><label>לוחית רישוי</label><input id="e-plate" value="' + v.license_plate + '"><label>יצרן</label><input id="e-make" value="' + v.make + '"><label>דגם</label><input id="e-model" value="' + v.model + '"><label>שנה</label><input id="e-year" type="number" value="' + v.year + '"><label>ק"מ נוכחי</label><input id="e-km" type="number" value="' + (v.current_mileage || '') + '"></div>';

  const saveBtn = document.createElement('button');
  saveBtn.className = 'btn btn-primary';
  saveBtn.style.width = 'auto';
  saveBtn.style.padding = '10px 32px';
  saveBtn.style.marginTop = '16px';
  saveBtn.textContent = 'שמור';
  saveBtn.addEventListener('click', async () => {
    const { error } = await db.from('vehicles').update({
      license_plate: document.getElementById('e-plate').value,
      make: document.getElementById('e-make').value,
      model: document.getElementById('e-model').value,
      year: parseInt(document.getElementById('e-year').value),
      current_mileage: document.getElementById('e-km').value ? parseInt(document.getElementById('e-km').value) : null,
    }).eq('id', vehicleId);
    if (error) { alert('שגיאה: ' + error.message); return; }
    loadVehicleDetail(vehicleId, userId);
  });

  card.querySelector('.edit-form').appendChild(saveBtn);
  main.appendChild(card);
}

async function deleteVehicle(vehicleId, userId) {
  if (!confirm('למחוק את הרכב? כל הטיפולים יימחקו גם.')) return;
  const { error } = await db.from('vehicles').delete().eq('id', vehicleId);
  if (error) { alert('שגיאה: ' + error.message); return; }
  loadUserDetail(userId);
}

// ===== SERVICE EDIT =====

function showServiceEdit(s, vehicleId, userId) {
  const main = document.getElementById('main-content');
  main.innerHTML = '';

  const backBtn = document.createElement('button');
  backBtn.className = 'btn-back';
  backBtn.textContent = '← חזרה לרכב';
  backBtn.addEventListener('click', () => loadVehicleDetail(vehicleId, userId));
  main.appendChild(backBtn);

  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = '<h3>עריכת טיפול</h3><div class="edit-form"><label>תאריך</label><input id="s-date" type="date" value="' + s.date + '" style="direction:ltr"><label>עבודה שבוצעה</label><textarea id="s-work">' + s.work_done + '</textarea><label>עלות (₪)</label><input id="s-cost" type="number" value="' + (s.cost || 0) + '"><label>ק"מ</label><input id="s-km" type="number" value="' + (s.mileage || '') + '"><label>הערות</label><textarea id="s-notes">' + (s.notes || '') + '</textarea></div>';

  const saveBtn = document.createElement('button');
  saveBtn.className = 'btn btn-primary';
  saveBtn.style.width = 'auto';
  saveBtn.style.padding = '10px 32px';
  saveBtn.style.marginTop = '16px';
  saveBtn.textContent = 'שמור';
  saveBtn.addEventListener('click', async () => {
    const work = document.getElementById('s-work').value;
    if (!work) { alert('שדה "עבודה שבוצעה" הוא חובה'); return; }
    const { error } = await db.from('service_records').update({
      date: document.getElementById('s-date').value,
      work_done: work,
      cost: parseFloat(document.getElementById('s-cost').value) || 0,
      mileage: document.getElementById('s-km').value ? parseInt(document.getElementById('s-km').value) : null,
      notes: document.getElementById('s-notes').value,
    }).eq('id', s.id);
    if (error) { alert('שגיאה: ' + error.message); return; }
    loadVehicleDetail(vehicleId, userId);
  });

  card.querySelector('.edit-form').appendChild(saveBtn);
  main.appendChild(card);
}

async function deleteService(serviceId, vehicleId, userId) {
  if (!confirm('למחוק את הטיפול?')) return;
  const { error } = await db.from('service_records').delete().eq('id', serviceId);
  if (error) { alert('שגיאה: ' + error.message); return; }
  loadVehicleDetail(vehicleId, userId);
}

// ===== AUTO LOGIN CHECK =====

const { data: { session } } = await db.auth.getSession();
if (session) {
  const { data: admin } = await db.from('admins').select('user_id').eq('user_id', session.user.id).single();
  if (admin) { showApp(); } else { await db.auth.signOut(); }
}
</script>
